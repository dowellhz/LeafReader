site_name: Leaf Reader Docs
site_description: Developer and release documentation for Leaf Reader.
site_url: https://leafreader.space/manual/
repo_url: https://github.com/dowellhz/LeafReader
repo_name: dowellhz/LeafReader
docs_dir: docs/wiki
site_dir: docs/manual
extra:
  homepage: https://leafreader.space/
  social:
    - icon: material/home
      link: https://leafreader.space/
      name: Leaf Reader Website
    - icon: fontawesome/brands/github
      link: https://github.com/dowellhz/LeafReader
      name: GitHub Repository
theme:
  name: material
  language: en
  logo: ../assets/leaf-reader-icon.png
  favicon: ../assets/leaf-reader-icon.png
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  palette:
    - scheme: default
      primary: green
      accent: light green
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: green
      accent: light green
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
nav:
  - Home: index.md
  - Architecture:
      - Architecture: architecture.md
      - Feature Map: feature-map.md
      - Development Tasks: development-tasks.md
      - Code Map: code-map.md
      - Type Index: type-index.md
  - Features:
      - Document Loading: document-loading.md
      - AI Chat: ai-chat.md
      - AI Analysis Cache: ai-analysis-cache.md
      - Word Highlights: word-highlights.md
  - Release:
      - Release Process: release-process.md
      - Release Checklist: release-checklist.md
      - Release Runbook: release-runbook.md
      - Troubleshooting: troubleshooting.md
      - Security: security.md
