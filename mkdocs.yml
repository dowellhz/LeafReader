site_name: Leaf Reader 文档
site_description: Leaf Reader 开发、发布和故障排查文档。
site_url: https://leafreader.space/manual/
repo_url: https://github.com/dowellhz/LeafReader
repo_name: dowellhz/LeafReader
docs_dir: docs/wiki
site_dir: docs/manual
extra_css:
  - stylesheets/leafreader.css
extra:
  homepage: https://leafreader.space/
  social:
    - icon: material/home
      link: https://leafreader.space/
      name: Leaf Reader Website
    - icon: fontawesome/brands/github
      link: https://github.com/dowellhz/LeafReader
      name: GitHub Repository
theme:
  name: material
  language: zh
  logo: ../assets/leaf-reader-icon.png
  favicon: ../assets/leaf-reader-icon.png
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  palette:
    - scheme: default
      primary: green
      accent: light green
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - scheme: slate
      primary: green
      accent: light green
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
nav:
  - 首页: index.md
  - 官网: https://leafreader.space/
  - 下载: https://github.com/dowellhz/LeafReader/releases/download/v1.4.14/LeafReader-1.4.14.pkg
  - 入门:
      - 安装与入门: getting-started.md
  - 架构:
      - 架构总览: architecture.md
      - 功能地图: feature-map.md
      - 开发任务入口: development-tasks.md
      - 代码地图: code-map.md
      - 类型索引: type-index.md
  - 功能:
      - 文档加载: document-loading.md
      - AI 聊天: ai-chat.md
      - AI 分析缓存: ai-analysis-cache.md
      - 单词高亮: word-highlights.md
  - 发布:
      - 发布流程: release-process.md
      - 发布检查清单: release-checklist.md
      - 发布 Runbook: release-runbook.md
      - 故障排查: troubleshooting.md
      - 安全: security.md
