<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Reader</title>
  <link rel="stylesheet" href="css/flip.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Top Toolbar -->
  <div id="top-toolbar">
    <div class="toolbar-left">
      <label class="upload-btn" title="Upload PDF">
        <input type="file" id="file-input" accept=".pdf">
        <span>Upload PDF</span>
      </label>
    </div>
    <div class="toolbar-center">
      <button id="btn-zoom-out" class="toolbar-btn" title="Zoom Out">-</button>
      <span id="zoom-indicator">100%</span>
      <button id="btn-zoom-in" class="toolbar-btn" title="Zoom In">+</button>
      <span id="page-indicator">No PDF loaded</span>
    </div>
    <div class="toolbar-right">
      <button id="btn-fullscreen" class="toolbar-btn" title="Fullscreen">Full</button>
      <button id="btn-ai-panel" class="toolbar-btn" title="AI Panel">AI Panel</button>
    </div>
  </div>

  <!-- Upload Zone (shown when no PDF loaded) -->
  <div id="upload-zone">
    <div class="upload-inner">
      <div class="upload-icon">PDF</div>
      <p>Drop PDF here or click to upload</p>
      <p class="upload-hint">Supports .pdf files</p>
    </div>
  </div>

  <!-- Book Container -->
  <div id="book-wrapper">
    <div class="book-container">
      <div class="book" id="book">
        <div class="page page-left" id="page-left">
          <div class="page-content">
            <canvas id="canvas-left"></canvas>
            <div class="textLayer" id="text-layer-left"></div>
          </div>
        </div>
        <div class="page page-right" id="page-right">
          <div class="page-content">
            <canvas id="canvas-right"></canvas>
            <div class="textLayer" id="text-layer-right"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Page Flip Overlay (hidden, created dynamically) -->

  <!-- Bottom Navigation -->
  <div id="bottom-nav">
    <button id="btn-prev" class="nav-btn" disabled>Prev</button>
    <button id="btn-next" class="nav-btn" disabled>Next</button>
  </div>

  <!-- Floating Selection Toolbar -->
  <div id="float-toolbar" class="hidden">
    <button id="btn-analyze">AI Analyze</button>
    <button id="btn-close-toolbar">x</button>
  </div>

  <!-- AI Analysis Panel -->
  <div id="ai-panel" class="hidden">
    <div class="ai-panel-header">
      <h3>AI Analyze</h3>
      <button id="btn-close-panel">x</button>
    </div>
    <div class="ai-panel-body">
      <div id="ai-selected-text" class="ai-section"></div>
      <div class="ai-section">
        <h4>Summary</h4>
        <div id="ai-context"></div>
      </div>
      <div class="ai-section">
        <h4>Key Vocabulary</h4>
        <div id="ai-usage"></div>
      </div>
      <div id="ai-vocabulary" style="display:none"></div>
    </div>
  </div>

  <!-- PDF.js (local) -->
  <script src="pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'pdf.worker.min.js';
  </script>

  <!-- App Scripts -->
  <script src="js/storage.js"></script>
  <script src="js/pdf-loader.js"></script>
  <script src="js/page-flip.js"></script>
  <script src="js/text-select.js"></script>
  <script src="js/ai-panel.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
